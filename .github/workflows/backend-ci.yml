name: Backend CI

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Test backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        shell: bash
        working-directory: backend

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      APP_ENV: "test"
      APP_DEBUG: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint (ruff)
        run: |
          if command -v ruff >/dev/null 2>&1; then
            ruff check . --output-format=github
          else
            pip install ruff
            ruff check . --output-format=github
          fi

      - name: Run tests
        run: |
          pytest -q --tb=short --disable-warnings --junitxml=pytest-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-py${{ matrix.python-version }}
          path: backend/pytest-report.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Docker build (validates the image can be built)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: campanhapro-cenarios-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
